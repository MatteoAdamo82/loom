name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  # Run JavaScript actions on Node 24. Removes the deprecation warning that
  # GitHub will turn into a hard requirement on 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  cli-binaries:
    name: CLI binaries (goreleaser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Personal access token with write access to MatteoAdamo82/homebrew-loom.
          # Optional: when unset, the brew formula is built but not pushed to
          # the tap (the rest of the release continues normally).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  macos-app:
    name: macOS GUI app (Wails)
    runs-on: macos-latest
    needs: cli-binaries
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cmd/loom-gui/frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Resolve version
        id: vars
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Loom.app
        working-directory: cmd/loom-gui
        run: |
          wails build \
            -trimpath \
            -ldflags "-s -w -X main.Version=${{ steps.vars.outputs.version }}"
          # Wails outputs build/bin/loom-gui.app — rename for release.
          mv build/bin/loom-gui.app build/bin/Loom.app

      - name: Package as zip
        working-directory: cmd/loom-gui/build/bin
        run: |
          ditto -c -k --keepParent Loom.app \
            "Loom_${{ steps.vars.outputs.version }}_macos_universal.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: cmd/loom-gui/build/bin/Loom_*.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
